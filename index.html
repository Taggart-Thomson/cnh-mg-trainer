<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#C1272D" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="CNH-MG" />
<title>Prova CNH — MG Trainer</title>

<link rel="manifest" href="manifest.json" />

<style>
/* ============================================================
   DESIGN SYSTEM — grounded in Brazilian road signage
   Palette:
     paper    #F5F0E6  road-manual off-white background
     ink      #1C1A17  near-black text
     regRed   #C1272D  regulatory-sign red (primary accent)
     signYel  #F2B705  warning-sign yellow (progress / warmth)
     infoBlue #14488F  information-sign deep blue (structure)
     goGreen  #2E7D46  positive / correct
   Type:
     Display  Archivo (condensed, road-signage cousin)
     Body     Inter
   ============================================================ */

@import url('https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=Inter:wght@400;500;600;700&display=swap');

:root{
  --paper:#F5F0E6; --paper2:#EFE8D8; --card:#FFFFFF;
  --ink:#1C1A17; --ink2:#5A5347;
  --red:#C1272D; --redDk:#9E1E23;
  --yel:#F2B705; --yelDk:#C99500;
  --blue:#14488F; --blueDk:#0E3468;
  --green:#2E7D46; --greenDk:#215C33;
  --line:#DCD3BF;
  --shadow:0 2px 0 rgba(28,26,23,.08), 0 8px 24px rgba(28,26,23,.10);
  --radius:18px;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--paper);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:none;
}
button{font-family:inherit;cursor:pointer;border:none;background:none}
#root{max-width:520px;margin:0 auto;min-height:100vh;position:relative}

/* ---------- shared scaffolding ---------- */
.app-pad{padding:0 20px}
.safe-top{padding-top:env(safe-area-inset-top)}
.safe-bot{padding-bottom:calc(env(safe-area-inset-bottom) + 16px)}

.eyebrow{font-family:'Archivo';font-weight:800;letter-spacing:.14em;text-transform:uppercase;font-size:11px;color:var(--ink2)}
h1,h2,h3{font-family:'Archivo';margin:0;line-height:1.02}
.h-xl{font-weight:900;font-size:30px;letter-spacing:-.01em}
.h-lg{font-weight:800;font-size:22px}

/* ---------- top bar ---------- */
.topbar{position:sticky;top:0;z-index:20;background:var(--paper);
  display:flex;align-items:center;gap:12px;padding:14px 20px 12px;border-bottom:1px solid var(--line)}
.topbar .back{width:40px;height:40px;border-radius:12px;background:var(--card);
  box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--ink)}
.topbar .title{flex:1;font-family:'Archivo';font-weight:800;font-size:17px}
.streak{display:flex;align-items:center;gap:5px;font-family:'Archivo';font-weight:800;color:var(--redDk);
  background:#FBE9D6;border:1.5px solid var(--yel);padding:6px 11px;border-radius:999px;font-size:14px}

/* ---------- HOME: the sign-post map ---------- */
.home-hero{padding:22px 20px 8px}
.plate{display:inline-flex;align-items:center;gap:10px;background:var(--ink);color:#fff;
  border-radius:8px;padding:7px 12px 7px 8px;font-family:'Archivo';font-weight:800;letter-spacing:.04em;
  box-shadow:var(--shadow)}
.plate .br{background:var(--infoBlue,#14488F);color:#fff;background:#14488F;border-radius:4px;
  font-size:11px;padding:3px 6px;letter-spacing:.1em}
.plate .num{font-size:16px}
.hero-title{margin-top:16px;font-weight:900;font-size:32px;letter-spacing:-.02em;line-height:1.0}
.hero-sub{color:var(--ink2);margin-top:8px;font-size:15px;line-height:1.45;max-width:34ch}

.progress-band{margin:18px 20px 6px;background:var(--card);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:16px 18px;display:flex;align-items:center;gap:16px}
.ring{--p:0;width:56px;height:56px;border-radius:50%;flex:none;
  background:conic-gradient(var(--green) calc(var(--p)*1%), var(--paper2) 0);
  display:flex;align-items:center;justify-content:center}
.ring i{width:42px;height:42px;border-radius:50%;background:var(--card);display:flex;align-items:center;
  justify-content:center;font-style:normal;font-family:'Archivo';font-weight:800;font-size:15px}
.progress-band .txt b{font-family:'Archivo';font-size:15px;display:block}
.progress-band .txt span{font-size:13px;color:var(--ink2)}

.section-label{display:flex;align-items:center;gap:10px;margin:26px 20px 14px}
.section-label .ln{height:2px;background:var(--line);flex:1;border-radius:2px}

/* the vertical path */
.path{position:relative;padding:0 20px 30px}
.node{position:relative;display:flex;align-items:center;gap:16px;padding:10px 0}
.node .connector{position:absolute;left:47px;top:-14px;height:28px;width:4px;background:var(--line);border-radius:2px;z-index:0}
.node:first-child .connector{display:none}
.badge{width:56px;height:56px;flex:none;border-radius:16px;display:flex;align-items:center;justify-content:center;
  position:relative;z-index:1;box-shadow:var(--shadow);font-size:26px;transition:transform .12s}
.badge:active{transform:scale(.94)}
.badge.red{background:var(--red)} .badge.yellow{background:var(--yel)}
.badge.blue{background:var(--blue)} .badge.green{background:var(--green)}
.badge.locked{background:#CFC7B4}
.badge .done{position:absolute;right:-5px;bottom:-5px;width:23px;height:23px;border-radius:50%;
  background:var(--green);border:2.5px solid var(--paper);display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:12px;font-weight:800}
.node .meta{flex:1;min-width:0}
.node .meta b{font-family:'Archivo';font-weight:800;font-size:17px;display:block}
.node .meta span{font-size:13px;color:var(--ink2)}
.node .chev{color:var(--ink2);font-size:20px;padding-right:2px}
.node.locked .meta b{color:var(--ink2)}

/* exam node — the destination */
.exam-node{margin:8px 20px 0;background:linear-gradient(135deg,var(--redDk),var(--red));
  border-radius:var(--radius);padding:20px;color:#fff;box-shadow:var(--shadow);position:relative;overflow:hidden}
.exam-node::after{content:"";position:absolute;right:-30px;top:-30px;width:130px;height:130px;
  border:14px solid rgba(255,255,255,.10);border-radius:50%}
.exam-node .eyebrow{color:rgba(255,255,255,.75)}
.exam-node h2{color:#fff;margin-top:6px;font-size:24px}
.exam-node p{color:rgba(255,255,255,.85);font-size:14px;margin:8px 0 16px;line-height:1.4;max-width:32ch}
.btn-white{background:#fff;color:var(--redDk);font-family:'Archivo';font-weight:800;font-size:15px;
  padding:12px 20px;border-radius:12px;display:inline-flex;align-items:center;gap:8px}

/* ---------- generic button ---------- */
.btn{width:100%;font-family:'Archivo';font-weight:800;font-size:16px;padding:16px;border-radius:14px;
  color:#fff;background:var(--green);box-shadow:0 4px 0 var(--greenDk);transition:transform .08s, box-shadow .08s;
  letter-spacing:.01em}
.btn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--greenDk)}
.btn.red{background:var(--red);box-shadow:0 4px 0 var(--redDk)} .btn.red:active{box-shadow:0 1px 0 var(--redDk)}
.btn.blue{background:var(--blue);box-shadow:0 4px 0 var(--blueDk)} .btn.blue:active{box-shadow:0 1px 0 var(--blueDk)}
.btn.ghost{background:var(--card);color:var(--ink);box-shadow:var(--shadow)}
.btn.ghost:active{transform:translateY(2px)}
.btn:disabled{opacity:.45;box-shadow:none;transform:none}
.btn-row{position:sticky;bottom:0;background:linear-gradient(transparent,var(--paper) 22%);
  padding:16px 20px calc(env(safe-area-inset-bottom) + 16px)}

/* ---------- LESSON: vocab flashcards ---------- */
.stage{padding:8px 20px 20px;min-height:calc(100vh - 130px);display:flex;flex-direction:column}
.progline{height:12px;background:var(--paper2);border-radius:999px;margin:6px 20px 4px;overflow:hidden}
.progline i{display:block;height:100%;background:var(--yel);border-radius:999px;transition:width .3s;box-shadow:inset 0 -2px 0 rgba(0,0,0,.08)}
.kicker{font-family:'Archivo';font-weight:800;font-size:12px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--ink2);margin:20px 0 14px;text-align:center}

.flash{background:var(--card);border-radius:22px;box-shadow:var(--shadow);border:1px solid var(--line);
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
  padding:34px 26px;position:relative;min-height:340px}
.flash .tag{position:absolute;top:16px;left:16px;font-family:'Archivo';font-weight:800;font-size:10px;
  letter-spacing:.12em;text-transform:uppercase;color:#fff;background:var(--blue);padding:4px 9px;border-radius:6px}
.flash .pt{font-family:'Archivo';font-weight:900;font-size:38px;letter-spacing:-.01em}
.flash .pron{color:var(--ink2);font-size:14px;margin-top:6px}
.flash .en{font-size:20px;font-weight:700;color:var(--green);margin-top:22px}
.flash .note{font-size:14px;color:var(--ink2);margin-top:14px;line-height:1.5;max-width:30ch;
  background:var(--paper);padding:12px 14px;border-radius:12px;border:1px dashed var(--line)}
.flash .flip-hint{position:absolute;bottom:16px;font-size:12px;color:var(--ink2);letter-spacing:.04em}
.hidden{display:none}

/* ---------- TEACH card ---------- */
.teach{background:var(--card);border-radius:22px;box-shadow:var(--shadow);border:1px solid var(--line);
  flex:1;padding:30px 26px;display:flex;flex-direction:column;justify-content:center;min-height:340px}
.teach .cnum{font-family:'Archivo';font-weight:900;font-size:46px;color:var(--yel);line-height:1}
.teach h3{font-size:25px;margin:10px 0 16px;letter-spacing:-.01em}
.teach p{font-size:16px;line-height:1.6;color:var(--ink)}
.teach p b{color:var(--redDk)}
.ex-lang{display:inline-block;font-family:'Archivo';font-weight:800;font-size:10px;letter-spacing:.12em;
  text-transform:uppercase;color:var(--blue);background:rgba(20,72,143,.09);
  padding:4px 9px;border-radius:999px;margin-bottom:12px;align-self:flex-start}
.ex-opts{display:flex;flex-direction:column;gap:8px;margin:6px 0 14px}
.ex-opt{padding:11px 14px;border-radius:12px;border:1px solid var(--line);background:var(--paper);
  font-size:15px;line-height:1.4;color:var(--ink2)}
.ex-opt.ex-correct{border-color:var(--green);background:rgba(46,125,70,.10);color:var(--ink);font-weight:600}
.ex-opt.ex-correct::before{content:"✓ ";color:var(--green);font-weight:800}
.ex-why{font-size:15px;line-height:1.55;color:var(--ink);margin:0 0 12px}
.ex-why b{color:var(--greenDk)}
.ex-note{font-size:12.5px;line-height:1.5;color:var(--ink2);font-style:italic;
  border-top:1px dashed var(--line);padding-top:12px;margin:0}

/* ---------- QUIZ ---------- */
.q-count{text-align:center;font-family:'Archivo';font-weight:800;color:var(--ink2);font-size:13px;
  letter-spacing:.1em;text-transform:uppercase;margin:18px 0 4px}
.q-text{background:var(--card);border-radius:18px;box-shadow:var(--shadow);border:1px solid var(--line);
  padding:22px 20px;font-size:19px;font-weight:600;line-height:1.4;margin-bottom:16px}
.q-text .ptq{color:var(--ink);font-style:normal}
.opt{display:flex;align-items:center;gap:14px;width:100%;text-align:left;background:var(--card);
  border:2px solid var(--line);border-radius:14px;padding:15px 16px;margin-bottom:11px;font-size:16px;
  font-weight:500;color:var(--ink);box-shadow:0 2px 0 rgba(28,26,23,.05);transition:transform .07s}
.opt:active{transform:scale(.99)}
.opt .key{width:30px;height:30px;flex:none;border-radius:9px;background:var(--paper2);color:var(--ink2);
  font-family:'Archivo';font-weight:800;display:flex;align-items:center;justify-content:center;font-size:14px}
.opt.correct{border-color:var(--green);background:#EAF5EE}
.opt.correct .key{background:var(--green);color:#fff}
.opt.wrong{border-color:var(--red);background:#FBEBEC}
.opt.wrong .key{background:var(--red);color:#fff}
.opt.dim{opacity:.5}
.opt[disabled]{cursor:default}

.feedback{border-radius:16px;padding:16px 18px;margin-top:4px;animation:rise .25s ease}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.feedback.ok{background:#EAF5EE;border:1.5px solid var(--green)}
.feedback.no{background:#FBEBEC;border:1.5px solid var(--red)}
.feedback .fh{font-family:'Archivo';font-weight:800;font-size:16px;display:flex;align-items:center;gap:8px}
.feedback.ok .fh{color:var(--greenDk)} .feedback.no .fh{color:var(--redDk)}
.feedback .why{font-size:14px;color:var(--ink);margin-top:8px;line-height:1.5}
.feedback .hintword{font-size:13px;color:var(--ink2);margin-top:10px;background:rgba(242,183,5,.16);
  border-left:3px solid var(--yel);padding:8px 12px;border-radius:8px}
.feedback .hintword b{color:var(--redDk)}

/* ---------- exam timer ---------- */
.exam-bar{display:flex;align-items:center;gap:12px;padding:12px 20px;background:var(--paper);
  border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20}
.timer{font-family:'Archivo';font-weight:800;font-size:17px;background:var(--ink);color:#fff;
  padding:7px 13px;border-radius:10px;letter-spacing:.03em}
.timer.warn{background:var(--red)}
.exam-bar .mini{height:10px;flex:1;background:var(--paper2);border-radius:999px;overflow:hidden}
.exam-bar .mini i{display:block;height:100%;background:var(--blue);border-radius:999px;transition:width .3s}
.exam-bar .qn{font-family:'Archivo';font-weight:800;font-size:13px;color:var(--ink2)}

/* ---------- RESULTS ---------- */
.result-wrap{padding:30px 24px;text-align:center;min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center}
.result-seal{width:150px;height:150px;border-radius:50%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;color:#fff;box-shadow:var(--shadow);margin-bottom:8px}
.result-seal.pass{background:radial-gradient(circle at 30% 25%, #3EA85C, var(--greenDk))}
.result-seal.fail{background:radial-gradient(circle at 30% 25%, #D6494F, var(--redDk))}
.result-seal .score{font-family:'Archivo';font-weight:900;font-size:46px;line-height:1}
.result-seal .of{font-size:14px;opacity:.85;font-weight:600}
.result-title{font-family:'Archivo';font-weight:900;font-size:30px;margin:20px 0 6px}
.result-sub{color:var(--ink2);font-size:16px;line-height:1.5;max-width:32ch;margin-bottom:8px}
.stat-row{display:flex;gap:12px;width:100%;margin:22px 0}
.stat{flex:1;background:var(--card);border-radius:14px;box-shadow:var(--shadow);padding:14px 8px}
.stat b{font-family:'Archivo';font-weight:900;font-size:24px;display:block}
.stat span{font-size:12px;color:var(--ink2);letter-spacing:.03em}
.review-toggle{color:var(--blue);font-weight:700;font-size:15px;text-decoration:underline;margin:6px 0 18px}

/* review list */
.rev{background:var(--card);border-radius:14px;box-shadow:var(--shadow);border:1px solid var(--line);
  padding:16px;margin-bottom:12px;text-align:left}
.rev .rq{font-weight:600;font-size:15px;line-height:1.4}
.rev .ra{font-size:14px;margin-top:10px;display:flex;gap:8px;align-items:flex-start}
.rev .ra .lbl{font-family:'Archivo';font-weight:800;font-size:11px;padding:2px 7px;border-radius:5px;flex:none;margin-top:1px}
.rev .ra.you .lbl{background:#FBEBEC;color:var(--redDk)}
.rev .ra.cor .lbl{background:#EAF5EE;color:var(--greenDk)}

/* small footer hint on home */
.foot-hint{text-align:center;color:var(--ink2);font-size:12px;line-height:1.5;padding:8px 30px 30px}
.foot-hint b{color:var(--ink)}

/* reduced motion */
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
:focus-visible{outline:3px solid var(--blue);outline-offset:2px}
</style>
</head>
<body>
<div id="root"></div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
